<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Калькулятор печати книги тетрадями — порядок страниц онлайн</title>
    <meta
      name="description"
      content="Бесплатный калькулятор для расчёта порядка страниц при печати книги или брошюры тетрадями на обычном принтере. Поддержка 2, 4 и 8 страниц на лист."
      id="meta-description"
    />
    <meta
      name="keywords"
      content="печать книги тетрадями, порядок страниц для печати, калькулятор печати брошюры, печать буклета онлайн"
      id="meta-keywords"
    />

    <link rel="canonical" href="" id="canonical-url" />
    <link rel="alternate" hreflang="ru" href="" id="alt-ru" />
    <link rel="alternate" hreflang="en" href="" id="alt-en" />

    <link rel="icon" href="img/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="img/apple-touch-icon.svg" />

    <meta property="og:title" content="" id="og-title" />
    <meta property="og:description" content="" id="og-description" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" id="og-url" />
    <meta property="og:image" content="img/og-image.svg" />
    <meta property="og:locale" content="" id="og-locale" />
    <meta property="og:locale:alternate" content="" id="og-locale-alt" />

    <script type="application/ld+json" id="jsonld">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Калькулятор печати книги тетрадями",
        "alternateName": "Booklet Page Order Calculator",
        "description": "Бесплатный калькулятор для расчёта порядка страниц при печати книги или брошюры тетрадями на обычном принтере. Поддержка 2, 4 и 8 страниц на лист.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "inLanguage": ["ru", "en"]
      }
    </script>

    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/i18n.js"></script>
    <script defer src="js/calc.js"></script>
    <script defer src="js/book.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1 class="app-header__title" data-i18n="h1"></h1>
        <div class="app-header__controls">
          <div class="pill-group" role="group" aria-label="language">
            <label class="pill">
              <input type="radio" name="lang" id="lang-ru" value="ru" checked />
              <span>RU</span>
            </label>
            <label class="pill">
              <input type="radio" name="lang" id="lang-en" value="en" />
              <span>EN</span>
            </label>
          </div>
          <button type="button" class="icon-btn" id="theme-toggle" aria-label="Toggle theme"></button>
        </div>
      </header>

      <main>
        <section class="section">
          <h2 class="section-title" data-i18n="title"></h2>

          <div class="form">
            <div class="field">
              <div class="field__label" data-i18n="pgCountLabel"></div>
              <input class="field__input" id="pgCount" type="number" min="0" step="1" value="300" />
            </div>

            <div class="field">
              <div class="field__label" data-i18n="pagesPerSheetLabel"></div>
              <div class="pill-group" role="group" aria-label="pages per sheet">
                <label class="pill">
                  <input type="radio" name="pagesPerSheet" value="2" />
                  <span>2</span>
                </label>
                <label class="pill">
                  <input type="radio" name="pagesPerSheet" value="4" checked />
                  <span>4</span>
                </label>
                <label class="pill">
                  <input type="radio" name="pagesPerSheet" value="8" />
                  <span>8</span>
                </label>
              </div>
            </div>

            <div class="field">
              <div class="field__label" data-i18n="pagesPerSignature"></div>
              <input class="field__input" id="pagesPerBooklet" type="number" min="1" step="1" value="32" />
              <div class="field__error" id="pagesPerBookletError" hidden></div>
              <div class="field-advisory" id="pagesPerBookletAdvisory" hidden></div>
              <div class="field-hint" data-i18n="hintPagesPerBooklet"></div>
            </div>

            <div class="field">
              <div class="field__label">&nbsp;</div>
              <div class="toggle-row" role="group" aria-label="pad to fit">
                <div class="toggle-row__label" data-i18n="padToFit"></div>
                <label class="switch">
                  <input id="padToFit" type="checkbox" checked />
                  <span class="switch__track"><span class="switch__thumb"></span></span>
                </label>
              </div>
            </div>

            <div class="field">
              <div class="field__label">&nbsp;</div>
              <div class="pill-group" role="group" aria-label="paper feed mode">
                <label class="pill">
                  <input type="radio" name="feedMode" id="feed-standard" value="standard" checked />
                  <span data-i18n="feedStandard"></span>
                </label>
                <label class="pill">
                  <input type="radio" name="feedMode" id="feed-reverse" value="reverse" />
                  <span data-i18n="feedReverse"></span>
                </label>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <h2 class="section-title" data-i18n="resultsTitle"></h2>

          <div class="results-box" aria-live="polite">
            <div class="result-row">
              <div class="result-k" data-i18n="validationLabel"></div>
              <div class="result-v status-badge" id="validationMessage"></div>
            </div>

            <div class="details" id="validationDetails" hidden></div>

            <div class="result-row">
              <div class="result-k" data-i18n="a4TotalLabel"></div>
              <div class="result-v" id="a4Total"></div>
            </div>

            <div class="result-row">
              <div class="result-k" data-i18n="numberOfSignatures"></div>
              <div class="result-v" id="bookletCountValue"></div>
            </div>

            <div class="result-row">
              <div class="result-k" data-i18n="a4PerBookletLabel"></div>
              <div class="result-v" id="a4PerBookletValue"></div>
            </div>

            <div class="result-row" id="blankPagesRow" hidden>
              <div class="result-k" data-i18n="blankPagesAddedLabel"></div>
              <div class="result-v" id="blankPagesAdded"></div>
            </div>

            <div class="result-row">
              <div class="result-k" data-i18n="foldsTotalLabel"></div>
              <div class="result-v" id="foldsTotal"></div>
            </div>

            <div class="result-row">
              <div class="result-k" data-i18n="lastBookletPagesLabel"></div>
              <div class="result-v" id="lastBookletPages"></div>
            </div>
          </div>

          <div class="progress" id="printProgress" aria-live="polite"></div>
          <div id="results"></div>

          <button type="button" class="full-btn" id="help-toggle"></button>
          <div class="help" id="help" hidden>
            <h2 data-i18n="helpTitle"></h2>
            <div id="help-content"></div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__text" data-i18n="footerText"></div>
      </footer>
    </div>
  </body>
</html>
